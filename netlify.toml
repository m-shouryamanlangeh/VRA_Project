[build]
  command = "cd vra-tool/frontend && npm install && npm run build"
  publish = "vra-tool/frontend/dist"

[build.environment]
  NODE_VERSION = "20"
  PYTHON_VERSION = "3.11"

[functions]
  directory = "vra-tool/netlify/functions"
  included_files = [
    "app/**",
    "data/blacklists/**",
    "data/_meta.json",
  ]

[[redirects]]
  from = "/generate"
  to = "/.netlify/functions/api/generate"
  status = 200

[[redirects]]
  from = "/generate/*"
  to = "/.netlify/functions/api/generate/:splat"
  status = 200

[[redirects]]
  from = "/download/*"
  to = "/.netlify/functions/api/download/:splat"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200

[[redirects]]
  from = "/settings/test"
  to = "/.netlify/functions/api/settings/test"
  status = 200

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/api/health"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
