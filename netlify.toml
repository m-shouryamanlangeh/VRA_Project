[build]
  command = "cd vra-tool/frontend && npm install && npm run build"
  publish = "vra-tool/frontend/dist"

[build.environment]
  NODE_VERSION = "20"

# Backend is hosted on Render — see app/main.py.
# All frontend API calls go cross-origin via VITE_API_BASE_URL at build time,
# so Netlify only serves the static React bundle. SPA fallback below routes
# unknown paths back to index.html for client-side React Router.

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
